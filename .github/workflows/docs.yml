name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19'
          rebar3-version: '3'

      - name: Install hex and rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Build Erlang docs
        run: |
          mkdir -p _site/erlang
          rebar3 ex_doc
          cp -r doc/* _site/erlang/

      - name: Build Elixir docs
        run: |
          for wrapper in agent_wire_ex claude_ex codex_ex copilot_ex gemini_ex opencode_ex; do
            echo "::group::$wrapper"
            (cd wrappers/$wrapper && mix deps.get && mix docs)
            cp -r wrappers/$wrapper/doc _site/$wrapper
            echo "::endgroup::"
          done

      - name: Install landing page
        run: cp .github/pages/index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
