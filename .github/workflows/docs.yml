name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19'

      - name: Install hex and rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Build ExDoc for all wrappers
        run: |
          mkdir -p _site
          for wrapper in agent_wire_ex claude_ex codex_ex copilot_ex gemini_ex opencode_ex; do
            echo "::group::$wrapper"
            (cd wrappers/$wrapper && mix deps.get && mix docs)
            cp -r wrappers/$wrapper/doc _site/$wrapper
            echo "::endgroup::"
          done

      - name: Create index page
        run: |
          cat > _site/index.html <<'HEREDOC'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>BEAM Agent SDKs</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1rem; color: #1a1a2e; }
              h1 { border-bottom: 2px solid #6b46c1; padding-bottom: 0.5rem; }
              h2 { color: #6b46c1; margin-top: 2rem; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              a { color: #6b46c1; text-decoration: none; font-size: 1.1rem; font-weight: 500; }
              a:hover { text-decoration: underline; }
              .desc { color: #666; font-size: 0.9rem; display: block; margin-top: 0.15rem; }
            </style>
          </head>
          <body>
            <h1>BEAM Agent SDKs</h1>
            <p>Erlang/OTP and Elixir libraries for AI coding agent wire protocols.</p>
            <h2>Foundation</h2>
            <ul>
              <li>
                <a href="agent_wire_ex/">AgentWire</a>
                <span class="desc">Shared types, JSONL parsing, hooks, MCP servers, telemetry, and transport behaviour</span>
              </li>
            </ul>
            <h2>Adapter SDKs</h2>
            <ul>
              <li>
                <a href="claude_ex/">ClaudeEx</a>
                <span class="desc">Claude Code agent SDK</span>
              </li>
              <li>
                <a href="codex_ex/">CodexEx</a>
                <span class="desc">OpenAI Codex agent SDK</span>
              </li>
              <li>
                <a href="copilot_ex/">CopilotEx</a>
                <span class="desc">GitHub Copilot agent SDK</span>
              </li>
              <li>
                <a href="gemini_ex/">GeminiEx</a>
                <span class="desc">Google Gemini CLI agent SDK</span>
              </li>
              <li>
                <a href="opencode_ex/">OpencodeEx</a>
                <span class="desc">OpenCode agent SDK</span>
              </li>
            </ul>
          </body>
          </html>
          HEREDOC

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
