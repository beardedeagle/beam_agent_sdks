name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  erlang:
    name: Erlang (OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        otp: ['25', '26', '27', '28']
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3'

      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: erlang-${{ runner.os }}-otp-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            erlang-${{ runner.os }}-otp-${{ matrix.otp }}-

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 eunit

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: dialyzer-${{ runner.os }}-otp-28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            dialyzer-${{ runner.os }}-otp-28-

      - name: Run Dialyzer
        run: rebar3 dialyzer

  elixir:
    name: Elixir ${{ matrix.elixir }} (OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Elixir 1.17: OTP 25-27
          - elixir: '1.17'
            otp: '25'
          - elixir: '1.17'
            otp: '26'
          - elixir: '1.17'
            otp: '27'
          # Elixir 1.18: OTP 25-27
          - elixir: '1.18'
            otp: '25'
          - elixir: '1.18'
            otp: '26'
          - elixir: '1.18'
            otp: '27'
          # Elixir 1.19: OTP 26-28
          - elixir: '1.19'
            otp: '26'
          - elixir: '1.19'
            otp: '27'
          - elixir: '1.19'
            otp: '28'
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore mix cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.mix
            ~/.hex
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-otp-${{ matrix.otp }}

      - name: Install hex and rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Test wrappers
        run: |
          for wrapper in agent_wire_ex claude_ex codex_ex copilot_ex gemini_ex opencode_ex; do
            echo "::group::$wrapper"
            (cd wrappers/$wrapper && mix deps.get && mix test)
            echo "::endgroup::"
          done

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19'

      - name: Install hex and rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Check formatting
        run: |
          for wrapper in agent_wire_ex claude_ex codex_ex copilot_ex gemini_ex opencode_ex; do
            echo "::group::$wrapper"
            (cd wrappers/$wrapper && mix deps.get && mix format --check-formatted)
            echo "::endgroup::"
          done
